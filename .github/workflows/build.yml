name: Build and Release

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  OPENWRT_VERSION: "24.10.1"
  SDK_TARGET: mediatek/filogic
  SDK_ARCH: aarch64_cortex-a53
  SDK_GCC: gcc-13.3.0_musl
  SDK_DIR: /home/runner/openwrt-sdk

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Cross-compile the CSIdump user-space binary
  # ──────────────────────────────────────────────────────────────
  build-csidump:
    name: Build CSIdump Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake rsync unzip wget \
            libncurses5-dev libssl-dev zlib1g-dev gawk gettext \
            python3 python3-pip file

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_DIR }}
          key: ${{ runner.os }}-openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ env.SDK_TARGET }}-${{ env.SDK_ARCH }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          RELEASE="${OPENWRT_VERSION}"
          BASE_URL="https://downloads.openwrt.org/releases/${RELEASE}/targets/${SDK_TARGET}"

          # Locate the SDK archive name dynamically
          SDK_FILE=$(curl -fsSL "${BASE_URL}/" | \
            grep -oP 'openwrt-sdk-[^"]+\.tar\.(xz|zst)' | head -n1)

          if [ -z "$SDK_FILE" ]; then
            echo "::error::Could not find SDK tarball at ${BASE_URL}/"
            exit 1
          fi

          echo "Downloading ${BASE_URL}/${SDK_FILE}"
          wget -q "${BASE_URL}/${SDK_FILE}" -O sdk.tar

          echo "Extracting SDK..."
          mkdir -p "${SDK_DIR}"
          tar --strip-components=1 -xf sdk.tar -C "${SDK_DIR}"

      - name: Install SDK feeds and build libnl-tiny
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        working-directory: ${{ env.SDK_DIR }}
        run: |
          # Initialise feed lists so package sources are available
          ./scripts/feeds update -a
          ./scripts/feeds install -a || true   # non-fatal - some feeds may be unavailable

          # Build libnl-tiny (produces static library in staging_dir)
          make package/libs/libnl-tiny/compile \
            CONFIG_PACKAGE_libnl-tiny=y \
            -j$(nproc) V=s 2>&1 | tail -20

      - name: Locate toolchain paths
        id: paths
        run: |
          TC_DIR=$(find "${SDK_DIR}/staging_dir" -maxdepth 1 -type d \
            -name "toolchain-${SDK_ARCH}_${SDK_GCC}" | head -n1)
          TARGET_DIR=$(find "${SDK_DIR}/staging_dir" -maxdepth 1 -type d \
            -name "target-${SDK_ARCH}_musl" | head -n1)

          if [ -z "$TC_DIR" ] || [ -z "$TARGET_DIR" ]; then
            echo "::error::Could not locate toolchain or target directory in staging_dir"
            ls "${SDK_DIR}/staging_dir/"
            exit 1
          fi

          echo "TC_DIR=${TC_DIR}"        >> "$GITHUB_OUTPUT"
          echo "TARGET_DIR=${TARGET_DIR}" >> "$GITHUB_OUTPUT"
          echo "CROSS_CC=${TC_DIR}/bin/aarch64-openwrt-linux-gcc"   >> "$GITHUB_OUTPUT"
          echo "CROSS_CXX=${TC_DIR}/bin/aarch64-openwrt-linux-g++"  >> "$GITHUB_OUTPUT"

      - name: Verify libnl-tiny static library
        run: |
          TARGET_DIR="${{ steps.paths.outputs.TARGET_DIR }}"
          LIB_PATH="${TARGET_DIR}/usr/lib/libnl-tiny.a"
          if [ ! -f "$LIB_PATH" ]; then
            echo "::warning::libnl-tiny.a not found at ${LIB_PATH}; searching..."
            find "${SDK_DIR}" -name "libnl-tiny.a" 2>/dev/null | head -5
          else
            echo "Found: $LIB_PATH"
          fi

      - name: Configure CSIdump with CMake
        run: |
          TARGET_DIR="${{ steps.paths.outputs.TARGET_DIR }}"

          export OPENWRT_CC="${{ steps.paths.outputs.CROSS_CC }}"
          export OPENWRT_CXX="${{ steps.paths.outputs.CROSS_CXX }}"
          export OPENWRT_SYSROOT="${TARGET_DIR}"

          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="${GITHUB_WORKSPACE}/toolchain-aarch64-openwrt.cmake" \
            -DLIBNL_TINY_PATH="${TARGET_DIR}/usr/lib" \
            -DLIBNL_TINY_INCLUDE="${TARGET_DIR}/usr/include/libnl-tiny"

      - name: Build CSIdump
        run: cmake --build build -j$(nproc)

      - name: Verify binary architecture
        run: file build/CSIdump

      - name: Upload CSIdump artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSIdump-binary
          path: build/CSIdump
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build OpenWrt sysupgrade images (matrix per device)
  # Builds the modified mt76 kernel modules via the SDK, then
  # assembles a sysupgrade image with the OpenWrt ImageBuilder.
  # ──────────────────────────────────────────────────────────────
  build-openwrt-image:
    name: Build OpenWrt Image (${{ matrix.device.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: openwrt-one
            profile: openwrt_one
            packages: >-
              kmod-mt76 kmod-mt76-connac-lib kmod-mt7915e kmod-mt7916-firmware
              kmod-mt76-usb kmod-mt76x2 kmod-mt76-sdio
              luci luci-base
          - name: xiaomi-ax3000t
            profile: xiaomi_mi-router-ax3000t
            packages: >-
              kmod-mt76 kmod-mt76-connac-lib kmod-mt7915e kmod-mt7916-firmware
              kmod-mt76-usb kmod-mt76x2 kmod-mt76-sdio
              luci luci-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential rsync unzip wget zstd \
            libncurses5-dev libssl-dev zlib1g-dev \
            gawk gettext python3 file qemu-utils

  # -- SDK (for kernel module build) ----------------------------------
      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_DIR }}
          key: ${{ runner.os }}-openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ env.SDK_TARGET }}-${{ env.SDK_ARCH }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          RELEASE="${OPENWRT_VERSION}"
          BASE_URL="https://downloads.openwrt.org/releases/${RELEASE}/targets/${SDK_TARGET}"
          SDK_FILE=$(curl -fsSL "${BASE_URL}/" | \
            grep -oP 'openwrt-sdk-[^"]+\.tar\.(xz|zst)' | head -n1)
          echo "Downloading ${BASE_URL}/${SDK_FILE}"
          wget -q "${BASE_URL}/${SDK_FILE}" -O sdk.tar
          mkdir -p "${SDK_DIR}"
          tar --strip-components=1 -xf sdk.tar -C "${SDK_DIR}"

      - name: Set up SDK feeds and build mt76 kernel modules
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a || true

          # Build mt76 kernel module packages
          make package/kernel/mt76/compile \
            CONFIG_PACKAGE_kmod-mt76=y \
            CONFIG_PACKAGE_kmod-mt76-connac-lib=y \
            CONFIG_PACKAGE_kmod-mt7915e=y \
            -j$(nproc) V=s 2>&1 | tail -40

      - name: Collect mt76 kernel module .ko files
        id: collect-ko
        run: |
          KO_OUT="${GITHUB_WORKSPACE}/ko-files"
          mkdir -p "$KO_OUT"

          # Extract .ko files from the built packages in the SDK build_dir
          for ko in mt76.ko mt76-connac-lib.ko mt7915e.ko mt7916.ko \
                    mt76-usb.ko mt76x2-common.ko mt76x2e.ko; do
            found=$(find "${SDK_DIR}/build_dir" -name "$ko" 2>/dev/null | head -n1)
            if [ -n "$found" ]; then
              cp "$found" "$KO_OUT/"
              echo "Collected: $ko"
            fi
          done

          echo "Collected .ko files:"
          ls -lh "$KO_OUT/" || true
          echo "ko_dir=${KO_OUT}" >> "$GITHUB_OUTPUT"

      # ── ImageBuilder ───────────────────────────────────────────
      - name: Cache OpenWrt ImageBuilder
        id: cache-ib
        uses: actions/cache@v4
        with:
          path: /home/runner/openwrt-imagebuilder
          key: ${{ runner.os }}-openwrt-ib-${{ env.OPENWRT_VERSION }}-${{ env.SDK_TARGET }}

      - name: Download and extract OpenWrt ImageBuilder
        if: steps.cache-ib.outputs.cache-hit != 'true'
        run: |
          RELEASE="${OPENWRT_VERSION}"
          BASE_URL="https://downloads.openwrt.org/releases/${RELEASE}/targets/${SDK_TARGET}"
          IB_FILE=$(curl -fsSL "${BASE_URL}/" | \
            grep -oP 'openwrt-imagebuilder-[^"]+\.tar\.(xz|zst)' | head -n1)
          echo "Downloading ${BASE_URL}/${IB_FILE}"
          wget -q "${BASE_URL}/${IB_FILE}" -O ib.tar
          mkdir -p /home/runner/openwrt-imagebuilder
          tar --strip-components=1 -xf ib.tar -C /home/runner/openwrt-imagebuilder

      - name: Build sysupgrade image
        id: build-image
        run: |
          IB_DIR="/home/runner/openwrt-imagebuilder"
          OUT="${GITHUB_WORKSPACE}/image-out/${{ matrix.device.name }}"
          mkdir -p "$OUT"

          cd "$IB_DIR"

          # Build the target image
          make image \
            PROFILE="${{ matrix.device.profile }}" \
            PACKAGES="${{ matrix.device.packages }}" \
            EXTRA_IMAGE_NAME="csidump" \
            BIN_DIR="$OUT" \
            -j$(nproc) V=s 2>&1 | tail -60

          echo "Built images:"
          ls -lh "$OUT/" || true
          echo "image_dir=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Upload sysupgrade image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-image-${{ matrix.device.name }}
          path: ${{ steps.build-image.outputs.image_dir }}
          retention-days: 7

      - name: Upload mt76 kernel module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ko-files-${{ matrix.device.name }}
          path: ${{ steps.collect-ko.outputs.ko_dir }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release (tag pushes only)
  # ──────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-csidump, build-openwrt-image]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download CSIdump binary
        uses: actions/download-artifact@v4.1.3
        with:
          name: CSIdump-binary
          path: release-assets

      - name: Download OpenWRT One image
        uses: actions/download-artifact@v4.1.3
        with:
          name: openwrt-image-openwrt-one
          path: release-assets/images

      - name: Download Xiaomi AX3000T image
        uses: actions/download-artifact@v4.1.3
        with:
          name: openwrt-image-xiaomi-ax3000t
          path: release-assets/images

      - name: Download mt76 kernel modules (from OpenWRT One build)
        uses: actions/download-artifact@v4.1.3
        with:
          name: ko-files-openwrt-one
          path: release-assets/ko

      - name: Flatten release assets
        run: |
          # Move all .ko files to release root
          mv release-assets/ko/*.ko release-assets/ 2>/dev/null || true
          # Move sysupgrade images to release root
          find release-assets/images -name "*.itb" -o -name "*sysupgrade*.bin" \
            | xargs -I{} mv {} release-assets/ 2>/dev/null || true
          # Clean up empty subdirectories
          rm -rf release-assets/images release-assets/ko
          echo "Release assets:"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/CSIdump
            release-assets/*.ko
            release-assets/*.itb
            release-assets/*.bin
